name: EditMode CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test-editmode:
    name: Run EditMode Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: LFS-EditMode-${{ hashFiles('.gitattributes', '.lfsconfig', 'Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            LFS-EditMode-
            LFS-

      - name: Pull Git LFS files
        run: |
          git lfs install --local
          git lfs pull

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install NuGetForUnity CLI
        run: |
          dotnet new tool-manifest || true
          dotnet tool install NuGetForUnity.Cli || dotnet tool update NuGetForUnity.Cli

      - name: Restore NuGet packages before Unity
        run: |
          dotnet nugetforunity restore .

      - name: Verify restored R3 core
        run: |
          find Packages/nuget-packages -type f | grep -Ei '/R3(\.|/)|R3\.dll'

      - name: Cache Library
        id: cache-library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-EditMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**', 'Packages/nuget-packages/packages.config', 'Packages/nuget-packages/NuGet.config') }}

      - name: Remove stale Library on non-exact cache hit
        if: steps.cache-library.outputs.cache-hit != 'true'
        run: rm -rf Library

      - name: Run EditMode tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: editmode

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: ${{ steps.tests.outputs.artifactsPath }}